<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Search Engine</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container main-search">
        <div class="header">
            <h1><span>Mini</span>Search</h1>
            <p>IR Project &bull; NLP Ranking &bull; Clustering</p>
        </div>
        
        <form action="/search" method="POST" class="search-form">
            <div class="search-box">
                <input type="text" name="query" placeholder="Search the corpus..." required autofocus>
                <button type="submit">Search</button>
            </div>
        </form>

        <div class="actions">
            <a href="/clusters" class="btn btn-secondary">View Document Clusters</a>
        </div>
        
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
